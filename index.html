<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Target 1900 Study</title>
<style>
  :root { --bg:#f7f7f8; --card:#ffffff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --accent:#111827; }
  * { box-sizing:border-box; }
  body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
  header { padding:18px 16px 8px; max-width:760px; margin:auto; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:13px; }
  main { max-width:760px; margin:auto; padding:10px 16px 30px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin:12px 0; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  label { font-size:13px; color:var(--muted); display:block; margin-bottom:4px; }
  input, select, button { font:inherit; border-radius:12px; border:1px solid var(--line); padding:10px 12px; background:white; }
  input[type=number] { width:92px; }
  select { min-width:130px; }
  button { cursor:pointer; font-weight:650; }
  button.primary { background:var(--accent); color:white; border-color:var(--accent); }
  button.good { background:#ecfdf5; }
  button.bad { background:#fef2f2; }
  button:active { transform:translateY(1px); }
  .qno { color:var(--muted); font-size:14px; margin-bottom:10px; }
  .question { font-size:42px; font-weight:800; line-height:1.1; margin:18px 0; word-break:break-word; }
  .answer { font-size:22px; line-height:1.5; padding:14px; background:#f9fafb; border-radius:14px; margin:12px 0; display:none; }
  .stats { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; }
  .stat { background:#f9fafb; border-radius:14px; padding:10px; text-align:center; }
  .stat b { display:block; font-size:18px; }
  .stat span { font-size:12px; color:var(--muted); }
  .small { font-size:12px; color:var(--muted); }
  .list { max-height:240px; overflow:auto; font-size:14px; line-height:1.6; }
  .hidden { display:none; }
  @media (max-width:520px) {
    .question { font-size:34px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    input[type=number] { width:84px; }
  }
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
</head>
<body>
<header>
  <h1>Target 1900 Study</h1>
  <div class="sub">範囲指定・英→日/日→英・ミス単語復習対応</div>
</header>
<main>
  <section class="card">
    <div class="row">
      <div>
        <label>開始No.</label>
        <input id="startNo" type="number" min="1" max="1900" value="1">
      </div>
      <div>
        <label>終了No.</label>
        <input id="endNo" type="number" min="1" max="1900" value="100">
      </div>
      <div>
        <label>モード</label>
        <select id="mode">
          <option value="en-ja">英→日</option>
          <option value="ja-en">日→英</option>
        </select>
      </div>
      <div>
        <label>出題</label>
        <select id="order">
          <option value="random">ランダム</option>
          <option value="seq">順番</option>
        </select>
      </div>
      <div>
        <label>対象</label>
        <select id="source">
          <option value="range">指定範囲</option>
          <option value="wrong">ミス単語のみ</option>
          <option value="star">★単語のみ</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-top:12px">
      <button class="primary" onclick="startSession()">開始/更新</button>
      <button onclick="resetToday()">今日の記録リセット</button>
      <button onclick="clearMarks()">ミス/★を全消し</button>
    </div>
    <p class="small">例：Vintageみたいに「401〜500だけ」「昨日ミスった単語だけ」ができる。</p>
  </section>

  <section class="card">
    <div class="stats">
      <div class="stat"><b id="poolCount">0</b><span>出題対象</span></div>
      <div class="stat"><b id="doneCount">0</b><span>今日やった</span></div>
      <div class="stat"><b id="okCount">0</b><span>正解</span></div>
      <div class="stat"><b id="ngCount">0</b><span>ミス</span></div>
    </div>
  </section>

  <section class="card" id="quizCard">
    <div class="qno" id="qno">範囲を決めて開始</div>
    <div class="question" id="question">Ready</div>
    <input id="typed" placeholder="答えを入力してもOK" style="width:100%; margin-bottom:10px">
    <div class="answer" id="answer"></div>
    <div class="row">
      <button onclick="showAnswer()">答えを見る</button>
      <button class="good" onclick="markAnswer(true)">覚えた</button>
      <button class="bad" onclick="markAnswer(false)">ミスった</button>
      <button onclick="toggleStar()">★</button>
      <button onclick="nextQuestion()">次へ</button>
    </div>
  </section>

  <section class="card">
    <h3 style="margin:0 0 8px">ミス単語</h3>
    <div class="list" id="wrongList">なし</div>
  </section>
</main>

}, {"no": 1897, "word": "weary", "meaning": "疲れ果てた；（～に）うんざりした（of）"}, {"no": 1898, "word": "numb", "meaning": "麻痺した，無感覚な；ぼう然とした"}, {"no": 1899, "word": "mortal", "meaning": "致命的な（≒ fatal）；死すべき（運命の）（⇔ immortal 不死の）"}, {"no": 1900, "word": "zealous", "meaning": "熱心な；熱狂的な"}];
let pool = [];
let current = null;
let seqPos = 0;
let queue = [];
let currentSessionKey = "";
let advancedLock = false;

const saveKey = "target1900_app_state_v1";
let state = JSON.parse(localStorage.getItem(saveKey) || '{"wrong":{},"star":{},"today":{"done":0,"ok":0,"ng":0}}');

function save() { localStorage.setItem(saveKey, JSON.stringify(state)); }
function clamp(n,min,max) { return Math.max(min, Math.min(max, Number(n)||min)); }

function buildPool() {
  const s = clamp(document.getElementById("startNo").value,1,1900);
  const e = clamp(document.getElementById("endNo").value,1,1900);
  const a = Math.min(s,e), b = Math.max(s,e);
  const source = document.getElementById("source").value;
  if (source === "wrong") {
    pool = WORDS.filter(w => state.wrong[w.no]);
  } else if (source === "star") {
    pool = WORDS.filter(w => state.star[w.no]);
  } else {
    pool = WORDS.filter(w => w.no >= a && w.no <= b);
  }
  // 念のためNo.で完全重複除去
  const seen = new Set();
  pool = pool.filter(w => {
    if (seen.has(w.no)) return false;
    seen.add(w.no);
    return true;
  });
  document.getElementById("poolCount").textContent = pool.length;
}

function getSessionKey() {
  return [
    document.getElementById("startNo").value,
    document.getElementById("endNo").value,
    document.getElementById("mode").value,
    document.getElementById("order").value,
    document.getElementById("source").value,
    pool.map(w => w.no).join(",")
  ].join("|");
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetQuestionOrder() {
  seqPos = 0;
  const order = document.getElementById("order").value;
  queue = order === "random" ? shuffleArray(pool) : [...pool];
  currentSessionKey = getSessionKey();
  advancedLock = false;
}

function startSession() {
  buildPool();
  resetQuestionOrder();
  updateStats();
  updateLists();
  nextQuestion();
}

function finishSession() {
  current = null;
  advancedLock = false;
  document.getElementById("qno").textContent = "この範囲は一周完了";
  document.getElementById("question").textContent = "同じ範囲をもう一周するなら「開始 / 更新」を押して";
  document.getElementById("answer").style.display = "none";
  document.getElementById("typed").value = "";
}

function nextQuestion() {
  buildPool();
  const key = getSessionKey();
  if (key !== currentSessionKey) resetQuestionOrder();

  if (!pool.length) {
    current = null;
    advancedLock = false;
    document.getElementById("qno").textContent = "対象単語がない";
    document.getElementById("question").textContent = "範囲か対象を変えて";
    document.getElementById("answer").style.display = "none";
    return;
  }

  if (!queue.length) {
    finishSession();
    return;
  }

  current = queue.shift();
  advancedLock = false;
  const mode = document.getElementById("mode").value;
  document.getElementById("qno").textContent = `No.${current.no} ${state.star[current.no] ? "★" : ""}`;
  document.getElementById("question").textContent = mode === "en-ja" ? current.word : current.meaning;
  const ans = mode === "en-ja" ? current.meaning : current.word;
  document.getElementById("answer").textContent = ans;
  document.getElementById("answer").style.display = "none";
  document.getElementById("typed").value = "";
}

function showAnswer() {
  document.getElementById("answer").style.display = "block";
}

function markAnswer(ok) {
  if (!current || advancedLock) return;
  advancedLock = true;
  state.today.done++;
  if (ok) {
    state.today.ok++;
    delete state.wrong[current.no];
  } else {
    state.today.ng++;
    state.wrong[current.no] = true;
  }
  save();
  updateStats();
  updateLists();
  setTimeout(nextQuestion, 80);
}

function toggleStar() {
  if (!current) return;
  if (state.star[current.no]) delete state.star[current.no];
  else state.star[current.no] = true;
  save();
  document.getElementById("qno").textContent = `No.${current.no} ${state.star[current.no] ? "★" : ""}`;
  updateLists();
}

function updateStats() {
  document.getElementById("doneCount").textContent = state.today.done || 0;
  document.getElementById("okCount").textContent = state.today.ok || 0;
  document.getElementById("ngCount").textContent = state.today.ng || 0;
  document.getElementById("poolCount").textContent = pool.length || 0;
}

function updateLists() {
  const wrong = WORDS.filter(w => state.wrong[w.no]);
  const box = document.getElementById("wrongList");
  box.innerHTML = wrong.length ? wrong.map(w => `No.${w.no} <b>${w.word}</b>：${w.meaning}`).join("<br>") : "なし";
}

function resetToday() {
  state.today = {done:0, ok:0, ng:0};
  save(); updateStats();
}

function clearMarks() {
  if (!confirm("ミス単語と★単語を全部消す？")) return;
  state.wrong = {};
  state.star = {};
  save(); buildPool(); resetQuestionOrder(); updateStats(); updateLists(); nextQuestion();
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") showAnswer();
  if (e.key === "ArrowRight") nextQuestion();
});
startSession();
